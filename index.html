<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RandomSoulWrites Generator</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <textarea id="inputText" placeholder="Write your text here..."></textarea>

  <button onclick="generateDesign()">Generate</button>

  <div class="preview" id="preview">
    <div class="text" id="outputText"></div>

    <div class="username-wrap">
      <div class="username">@randomsoulwrites</div>
      <div class="pen-line"></div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
